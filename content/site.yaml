# Portico — site metadata overrides (renderer config).
# Prose/MDX and navigation come from CONTENT_ROOT (docs.json + *.mdx).
# OpenAPI bundles for /reference/* stay here unless moved to the content repo.

name: AgentRuntime Docs
description: Documentation powered by Portico from AgentRuntime.
url: https://docs.agentruntime.io
# Social preview image (absolute URL or site-relative path)
ogImage: /opengraph-image

# Google Search Console — paste the content value from the HTML tag method,
# or set GOOGLE_SITE_VERIFICATION in Vercel / .env.local (env wins over yaml).
verification:
  google: ""

# Optional: override "Edit this page" base (defaults from CONTENT_GIT_REPO + CONTENT_GIT_BRANCH)
# githubEditBase: https://github.com/your-org/your-docs/blob/main

openapi:
  specs:
    - id: agentruntime
      title: AgentRuntime API
      file: openapi/agentruntime.yaml
